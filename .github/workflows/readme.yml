name: Update profile README

on:
  schedule:
    - cron: '0 6 * * *' # Daily 06:00 UTC (08:00 CEST / 07:00 CET local)
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    name: Render README and commit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # git-auto-commit pushes the commit to main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true # git-auto-commit pushes via these credentials

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - run: bun install --frozen-lockfile

      # octofolio reads GITHUB_TOKEN to query the GitHub API for public profile data.
      # This is a read-only classic PAT (OCTOFOLIO_TOKEN secret): reading public repos,
      # PRs and contributions needs no scopes. Add `read:org` only if you belong to
      # private orgs whose repos should count as "org" (not "external") contributions.
      - name: Render README
        env:
          GITHUB_TOKEN: ${{ secrets.OCTOFOLIO_TOKEN }}
        run: bun render-readme.ts

      - name: Commit changes to main
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: 'chore: update profile README'
          file_pattern: README.md
